<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SIAP BOS - Sistem Aplikasi Pengelolaan BOS</title>
    <meta name="theme-color" content="#090d16" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/logo_siap_bos.svg" />
    <link rel="manifest" href="/manifest.json" />
    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      
      // Register service worker for modern PWA features
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            console.log('SIAP BOS ServiceWorker registered successfully:', reg.scope);
          }).catch((err) => {
            console.warn('SIAP BOS ServiceWorker registration failed:', err);
          });
        });
      }
      
      // Gracefully suppress benign Vite WebSocket and offline proxy HMR warning popups in development 
      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        if (reason) {
          const msg = String(reason.message || reason);
          if (msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('connection')) {
            event.preventDefault();
            console.log('Benign WebSocket event caught & suppressed.');
          }
        }
      });
      window.addEventListener('error', function(event) {
        const msg = String(event.message || '');
        if (msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('connection')) {
          event.preventDefault();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
