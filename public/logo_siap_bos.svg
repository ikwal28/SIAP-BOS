<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Modern Gradient Themes -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#030408" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.2" />
    </linearGradient>
    <!-- Filter for modern soft neon glow -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base background (Circular for standalone application icon) -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="4" />

  <!-- Ambient background subtle glow -->
  <circle cx="256" cy="256" r="140" fill="url(#glow-grad)" filter="blur(40px)" opacity="0.35" />

  <!-- The Emblem Shape (Glowing modern tech shield and open dynamic book / safe) -->
  <g transform="translate(0, -8)">
    <!-- Outer hexagonal or shield guidelines -->
    <path d="M256,110 L370,175 L370,305 L256,370 L142,305 L142,175 Z" 
          fill="none" 
          stroke="url(#primary-grad)" 
          stroke-width="12" 
          stroke-linejoin="round"
          filter="url(#neon-glow)" />

    <!-- Innermost book / education emblem representing BOS (Bantuan Operasional Sekolah) and security -->
    <path d="M256,170 
             C290,195 325,190 350,185 
             L350,290 
             C325,295 290,300 256,280 
             C222,300 187,295 162,290 
             L162,185 
             C187,190 222,195 256,170 Z" 
          fill="url(#primary-grad)" />

    <path d="M256,170 L256,280" 
          stroke="#0a0f1d" 
          stroke-width="4" 
          stroke-linecap="round" />

    <!-- Creative coin/money glowing ring representing finance/budget (BOS) -->
    <circle cx="256" cy="315" r="28" fill="#0c1122" stroke="url(#accent-grad)" stroke-width="8" filter="url(#neon-glow)" />
    <!-- Centered check mark/safe grid in coin -->
    <path d="M246,315 L252,321 L268,307" fill="none" stroke="url(#accent-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Subtle star emblem/glowing accents -->
  <path d="M380,140 L385,145 L390,140 L385,135 Z" fill="#ffffff" />
  <path d="M125,280 L128,283 L131,280 L128,277 Z" fill="#f59e0b" />
</svg>
